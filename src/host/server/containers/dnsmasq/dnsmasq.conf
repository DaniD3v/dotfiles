# Upstream DNS
server=192.168.0.1

address=/srinohosting.com/192.168.0.10
address=/danidev.vip/192.168.0.10

dhcp-range=192.168.0.15,192.168.0.253,255.255.255.0,12h
dhcp-option=option:router,192.168.0.1
dhcp-option=option:dns-server,192.168.0.10

domain-needed # doesn't resolve non qalified dns names such as "printer"
bogus-priv # doesn't reverse resolve private ip addresses
